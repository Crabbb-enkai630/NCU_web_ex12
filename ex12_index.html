<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <title>web_ex12</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
            line-height: 1.6;
        }

        .form-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            font-size: 1.1em;
        }

        input[type="text"] {
            width: 250px;
            padding: 5px;
            font-size: 1em;
        }

        .button-group {
            margin-top: 20px;
        }

        button, input[type="submit"], input[type="reset"] {
            padding: 5px 10px;
            font-size: 1em;
            cursor: pointer;
        }
    </style>
</head>

<body>

    <form action="#">

        <div class="form-group">
            <label>First name:</label>
            <input type="text" name="firstName" value="Your first name">
        </div>

        <div class="form-group">
            <label>Last name:</label>
            <input type="text" name="lastName" value="Your last name">
        </div>

        <div class="form-group">
            <label>Student ID:</label>
            <input type="text" name="studentId" value="Your student ID">
        </div>

        <div class="button-group">
            <input type="submit" value="Submit">
            <input type="reset" value="重設">
        </div>

    </form>

</body>
</html>
